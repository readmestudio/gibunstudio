<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>슬라이드 2 — VOICES (이런 말 들어보셨죠)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="../shared.css" />
</head>
<body>
<div class="card body">
  <div class="category">
    <div class="dot"></div>
    <div class="text">VOICES</div>
  </div>
  <div class="headline">이런 말,<br />들어보셨죠?</div>
  <div class="divider"></div>

  <!-- 인용 1: 작은 quote-block 두 개를 카드에 담기 위해 폰트/마진 인라인 조정 -->
  <div class="quote-block" style="font-size: 38px; margin: 0 0 36px;">
    "바쁘면 괜찮아.<br />뭐라도 하고 있으면 불안하지 않으니까."
  </div>

  <!-- 인용 2: 강조어는 .accent 처리 (오렌지) -->
  <div class="quote-block" style="font-size: 38px; margin: 0 0 48px;">
    "쉬면 게을러지는 것 같아요.<br /><span class="accent">멈추면 뒤처질 것 같아서<br />계속 움직여야 해요.</span>"
  </div>

  <div class="text">
    많은 분들이 이렇게 말해요. 바쁨이 곧 성실함이고, 멈추는 건 나태함이라고 믿으니까요.
  </div>

  <div class="meta-row footer">
    <div class="meta-muted">02 / 08</div>
    <div class="meta-muted next">NEXT →</div>
  </div>
</div>
</body>
</html>
