<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>MINDS 08 — 결과 + CTA</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="../shared.css" />
<style>
  .card.final { position: relative; padding: 0; overflow: hidden; }

  /* 배경: 마음카드 캡쳐 타일 (어둡게 깔기) */
  .tilefield { position: absolute; inset: 0; z-index: 0; overflow: hidden; }
  .tilegrid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    grid-auto-rows: 250px; gap: 18px;
    position: absolute; inset: -10% -8%;
    transform: rotate(-4deg) scale(1.12); transform-origin: center;
    opacity: 0.26;
  }
  .tilegrid img { width: 100%; height: 100%; object-fit: cover; object-position: top center;
    border-radius: 12px; filter: grayscale(0.2) brightness(0.9); }

  .final-scrim { position: absolute; inset: 0; z-index: 1; pointer-events: none;
    background:
      radial-gradient(ellipse 90% 60% at 50% 30%, rgba(232,93,58,0.12) 0%, rgba(232,93,58,0) 60%),
      linear-gradient(180deg, rgba(14,14,16,0.86) 0%, rgba(14,14,16,0.9) 40%, rgba(14,14,16,0.94) 70%, rgba(14,14,16,0.99) 100%); }

  .final-layer { position: relative; z-index: 2; height: 100%; box-sizing: border-box;
    padding: 76px 80px 0; display: flex; flex-direction: column; }

  .eyebrow { display: inline-flex; align-items: center; gap: 14px;
    color: var(--text-tertiary); font-size: 25px; font-weight: 700; letter-spacing: 0.04em;
    margin-bottom: 36px; }
  .eyebrow .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--accent); }

  .final-head { font-size: 62px; font-weight: 800; line-height: 1.25; letter-spacing: -0.04em;
    color: #fff; margin-bottom: 40px; }
  .final-head .accent { color: var(--accent); }

  .final-div { height: 2px; background: rgba(255,255,255,0.12); margin-bottom: 40px; }

  .final-body { font-size: 40px; font-weight: 400; line-height: 1.55; letter-spacing: -0.02em;
    color: var(--text-secondary); }
  .final-body + .final-body { margin-top: 28px; }
  .final-body .strong { color: #fff; font-weight: 700; }
  .final-body .hl { color: var(--accent); font-weight: 700; }

  .closing { margin-top: auto; padding: 44px 0 40px;
    font-size: 40px; font-weight: 800; line-height: 1.4; letter-spacing: -0.025em; color: #fff; }

  /* 하단 풀폭 오렌지 CTA 띠 */
  .band { position: relative; z-index: 2; background: var(--accent);
    box-shadow: 0 -24px 60px rgba(14,14,16,0.75);
    padding: 50px 80px; display: flex; align-items: center; justify-content: center; }
  .band .btn { display: inline-flex; align-items: center; gap: 18px;
    color: #fff; font-size: 42px; font-weight: 800; letter-spacing: -0.015em; }
  .band .btn .arrow { font-size: 38px; transform: translateY(2px); }
</style>
</head>
<body>
<div class="card final">
  <div class="tilefield">
    <div class="tilegrid">
      <img src="./captures/1.png" alt="" /><img src="./captures/2.png" alt="" /><img src="./captures/3.png" alt="" /><img src="./captures/4.png" alt="" />
      <img src="./captures/2.png" alt="" /><img src="./captures/3.png" alt="" /><img src="./captures/4.png" alt="" /><img src="./captures/1.png" alt="" />
      <img src="./captures/3.png" alt="" /><img src="./captures/4.png" alt="" /><img src="./captures/1.png" alt="" /><img src="./captures/2.png" alt="" />
      <img src="./captures/4.png" alt="" /><img src="./captures/1.png" alt="" /><img src="./captures/2.png" alt="" /><img src="./captures/3.png" alt="" />
      <img src="./captures/1.png" alt="" /><img src="./captures/2.png" alt="" /><img src="./captures/3.png" alt="" /><img src="./captures/4.png" alt="" />
      <img src="./captures/2.png" alt="" /><img src="./captures/3.png" alt="" /><img src="./captures/4.png" alt="" /><img src="./captures/1.png" alt="" />
      <img src="./captures/3.png" alt="" /><img src="./captures/4.png" alt="" /><img src="./captures/1.png" alt="" /><img src="./captures/2.png" alt="" />
    </div>
  </div>
  <div class="final-scrim"></div>

  <div class="final-layer">
    <div class="eyebrow"><span class="dot"></span>마지막으로 — 내 안의 마음 자가테스트</div>

    <div class="final-head">이 배역들을 알면,<br /><span class="accent">무엇이 달라질까요?</span></div>
    <div class="final-div"></div>

    <div class="final-body">
      내 기분도, 나도 모르게 튀어나오는 행동도 — 사실은 이 배역들이 만들어요. 정체를 모르면 그저 휘둘리지만, <span class="strong">'지금 누가 나섰는지'</span> 알아차리는 순간 그 마음과 한 발짝 거리를 둘 수 있게 됩니다.
    </div>
    <div class="final-body">
      빌런이 또 나를 다그칠 때 '아, 날 지키려고 저러는구나' 하고 멈춰 서게 되고, 무작정 도망가는 대신 잠깐 <span class="hl">고를 수 있게</span> 돼요. 나를 미워하는 대신, <span class="hl">이해하게</span> 되는 거죠.
    </div>

    <div class="closing">내 안엔 지금,<br />누가 무대에 올라 있을까요?</div>
  </div>

  <div class="band">
    <div class="btn">지금 무료로 테스트해보세요<span class="arrow">→</span></div>
  </div>
</div>
</body>
</html>
