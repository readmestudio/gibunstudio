<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>MINDS · THE CAST — 8장 미리보기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root { --s: 0.42; }
  html, body { margin: 0; background: #1a1a1a; font-family: Pretendard, system-ui, sans-serif; color: #fff; }
  .head { padding: 40px 48px 8px; }
  .head h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; margin: 0; }
  .head p { color: rgba(255,255,255,0.55); font-size: 15px; margin: 10px 0 0; }
  .grid { display: flex; flex-wrap: wrap; gap: 28px; padding: 32px 48px 64px; }
  .thumb {
    width: calc(1080px * var(--s)); height: calc(1350px * var(--s));
    overflow: hidden; border-radius: 6px;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    position: relative; background: #0e0e10;
  }
  .thumb iframe { width: 1080px; height: 1350px; border: 0; transform: scale(var(--s)); transform-origin: top left; }
  .cap { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 8px; }
  .col { display: flex; flex-direction: column; }
</style>
</head>
<body>
<div class="head">

</div>
<div class="grid">
  <div class="col"><div class="thumb"><iframe src="./01-cover.html"></iframe></div><div class="cap">01 · 표지</div></div>
  <div class="col"><div class="thumb"><iframe src="./02-concept.html"></iframe></div><div class="cap">02 · 개념+배역</div></div>
  <div class="col"><div class="thumb"><iframe src="./03-leader.html"></iframe></div><div class="cap">03 · 리더</div></div>
  <div class="col"><div class="thumb"><iframe src="./04-villain.html"></iframe></div><div class="cap">04 · 빌런</div></div>
  <div class="col"><div class="thumb"><iframe src="./05-rake.html"></iframe></div><div class="cap">05 · 난봉꾼</div></div>
  <div class="col"><div class="thumb"><iframe src="./06-manager.html"></iframe></div><div class="cap">06 · 관리자</div></div>
  <div class="col"><div class="thumb"><iframe src="./07-exile.html"></iframe></div><div class="cap">07 · 추방자</div></div>
  <div class="col"><div class="thumb"><iframe src="./08-result-cta.html"></iframe></div><div class="cap">08 · 결과+CTA</div></div>
</div>
