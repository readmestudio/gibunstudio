<div class="card illu">
  <div class="illu-bg"><img src="../minds-cast/illustrations/villain.png" alt="" /></div>
  <div class="illu-scrim"></div>
  <div class="illu-layer">
    <div class="category"><div class="dot"></div><div class="text">그런데, 사실은</div></div>
    <div class="headline">빌런은 나를<br /><span class="accent">미워하는 게 아니에요</span></div>
    <div class="stext">
      그 가혹한 채찍질의 끝엔 '네가 무너지지 않았으면' 하는 마음이 숨어 있어요. 빌런이 가장 두려워하는 건, <span class="strong">당신이 무시당하는 것</span>이거든요.
    </div>
    <div class="stext">
      미워하고 쫓아낼수록 목소리는 더 커져요. <span class="hl">'아, 나를 지키려고 저러는구나'</span> 하고 알아차리는 순간 — 비로소 한 걸음 거리를 둘 수 있게 됩니다.
    </div>
