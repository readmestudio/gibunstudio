<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>빌런 카드뉴스 — 7장 미리보기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root { --s: 0.42; }
  html, body { margin: 0; background: #1a1a1a; font-family: Pretendard, system-ui, sans-serif; color: #fff; }
  .head { padding: 40px 48px 8px; }
  .head h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; margin: 0; }
  .head p { color: rgba(255,255,255,0.55); font-size: 15px; margin: 10px 0 0; }
  .grid { display: flex; flex-wrap: wrap; gap: 28px; padding: 32px 48px 64px; }
  .thumb { width: calc(1080px * var(--s)); height: calc(1350px * var(--s)); overflow: hidden;
    border-radius: 6px; box-shadow: 0 18px 50px rgba(0,0,0,0.5); position: relative; background: #0e0e10; }
  .thumb iframe { width: 1080px; height: 1350px; border: 0; transform: scale(var(--s)); transform-origin: top left; }
  .cap { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 8px; }
  .col { display: flex; flex-direction: column; }
</style>
</head>
<body>
<div class="head">
  <h1>MINDS · 빌런 단독 카드뉴스</h1>
  <p>1080 × 1350 · 다크 모노톤 · 총 7장 · 빌런 일러스트(고대 벽화/피카소풍) 활용</p>
</div>
<div class="grid">
  <div class="col"><div class="thumb"><iframe src="./01-cover.html"></iframe></div><div class="cap">01 · 표지</div></div>
  <div class="col"><div class="thumb"><iframe src="./02-intro.html"></iframe></div><div class="cap">02 · 빌런이 있다는 것</div></div>
  <div class="col"><div class="thumb"><iframe src="./03-examples.html"></iframe></div><div class="cap">03 · 등장하는 순간</div></div>
  <div class="col"><div class="thumb"><iframe src="./04-behavior.html"></iframe></div><div class="cap">04 · 빌런의 행동</div></div>
  <div class="col"><div class="thumb"><iframe src="./05-thoughts.html"></iframe></div><div class="cap">05 · 자주 하는 생각</div></div>
  <div class="col"><div class="thumb"><iframe src="./06-understand.html"></iframe></div><div class="cap">06 · 비난 말고 이해</div></div>
  <div class="col"><div class="thumb"><iframe src="./07-cta.html"></iframe></div><div class="cap">07 · CTA</div></div>
</div>
</body>
</html>
