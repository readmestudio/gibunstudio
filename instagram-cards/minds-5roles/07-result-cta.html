<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>5ROLES 06 — 결과 + CTA</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="../shared.css" />
<link rel="stylesheet" href="./card.css" />
<style>
  .card.final { position: relative; padding: 0; overflow: hidden; }

  /* 배경: 5배역 캐릭터 타일(어둡게 깔기) */
  .tilefield { position: absolute; inset: 0; z-index: 0; overflow: hidden; }
  .tilegrid {
    display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-rows: 300px; gap: 14px;
    position: absolute; inset: -10% -8%;
    transform: rotate(-4deg) scale(1.12); transform-origin: center; opacity: 0.2; }
  .tilegrid img { width: 100%; height: 100%; object-fit: cover; object-position: center;
    border-radius: 12px; }

  .final-scrim { position: absolute; inset: 0; z-index: 1; pointer-events: none;
    background:
      radial-gradient(ellipse 90% 60% at 50% 30%, rgba(232,93,58,0.12) 0%, rgba(232,93,58,0) 60%),
      linear-gradient(180deg, rgba(14,14,16,0.86) 0%, rgba(14,14,16,0.9) 40%, rgba(14,14,16,0.94) 70%, rgba(14,14,16,0.99) 100%); }

  .final-layer { position: relative; z-index: 2; height: 100%; box-sizing: border-box;
    padding: 76px 80px 0; display: flex; flex-direction: column; }

  .eyebrow { display: inline-flex; align-items: center; gap: 14px;
    color: var(--text-tertiary); font-size: 25px; font-weight: 700; letter-spacing: 0.04em;
    margin-bottom: 36px; }
  .eyebrow .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--accent); }

  .final-head { font-size: 60px; font-weight: 800; line-height: 1.24; letter-spacing: -0.04em;
    color: #fff; margin-bottom: 40px; }
  .final-head .accent { color: var(--accent); }

  .final-div { height: 2px; background: rgba(255,255,255,0.12); margin-bottom: 40px; }

  .final-body { font-size: 40px; font-weight: 400; line-height: 1.55; letter-spacing: -0.02em;
    color: var(--text-secondary); }
  .final-body + .final-body { margin-top: 28px; }
  .final-body .strong { color: #fff; font-weight: 700; }
  .final-body .hl { color: var(--accent); font-weight: 700; }

  .closing { margin-top: auto; padding: 44px 0 40px;
    font-size: 40px; font-weight: 800; line-height: 1.4; letter-spacing: -0.025em; color: #fff; }

  .band { position: relative; z-index: 2; background: var(--accent);
    box-shadow: 0 -24px 60px rgba(14,14,16,0.75);
    padding: 50px 80px; display: flex; align-items: center; justify-content: center; }
  .band .btn { display: inline-flex; align-items: center; gap: 18px;
    color: #fff; font-size: 40px; font-weight: 800; letter-spacing: -0.015em; }
  .band .btn .arrow { font-size: 36px; transform: translateY(2px); }
</style>
</head>
<body>
<div class="card final">
  <div class="tilefield">
    <div class="tilegrid">
      <img src="./illustrations/leader.png" alt="" /><img src="./illustrations/villain.png" alt="" /><img src="./illustrations/rake.png" alt="" /><img src="./illustrations/manager.png" alt="" />
      <img src="./illustrations/exile.png" alt="" /><img src="./illustrations/manager.png" alt="" /><img src="./illustrations/leader.png" alt="" /><img src="./illustrations/villain.png" alt="" />
      <img src="./illustrations/rake.png" alt="" /><img src="./illustrations/exile.png" alt="" /><img src="./illustrations/villain.png" alt="" /><img src="./illustrations/leader.png" alt="" />
      <img src="./illustrations/manager.png" alt="" /><img src="./illustrations/rake.png" alt="" /><img src="./illustrations/exile.png" alt="" /><img src="./illustrations/villain.png" alt="" />
    </div>
  </div>
  <div class="final-scrim"></div>

  <div class="stamp"><span class="big">무료</span><span class="small">3분</span></div>

  <div class="final-layer">
    <div class="eyebrow"><span class="dot"></span>마지막으로 — 내 마음 배역 진단</div>

    <div class="final-head">그래서 제일 중요한 건,<br /><span class="accent">내 배역을 알아보는 것</span></div>
    <div class="final-div"></div>

    <div class="final-body">
      지금 내 무대엔 누가 올라와 있는지, <span class="strong">내 마음 속 배역들을 알아보는 거예요.</span>
    </div>
    <div class="final-body">
      누가 리더고 누가 빌런인지 알면, 다음 순간 휘둘리지 않고 <span class="hl">자리를 바로잡을</span> 수 있어요.
    </div>

    <div class="closing">지금 3분 무료 테스트로,<br />내 안의 배역들을 모두 만나보세요.</div>
  </div>

  <div class="band">
    <div class="btn">지금 3분 무료 테스트로 진단받기<span class="arrow">→</span></div>
  </div>
</div>
</body>
</html>
