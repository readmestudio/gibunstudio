<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>5ROLES 05 — 빌런이 리더 자리에 앉으면</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="../shared.css" />
<link rel="stylesheet" href="./card.css" />
</head>
<body>
<div class="card stage">
  <div class="stage-spot"></div>

  <!-- 밀려난 배역들 -->
  <div class="pushed p1"><img src="./illustrations/cutout/leader.png" alt="" /></div>
  <div class="pushed p2"><img src="./illustrations/cutout/manager.png" alt="" /></div>
  <div class="pushed p3"><img src="./illustrations/cutout/rake.png" alt="" /></div>
  <div class="pushed p4"><img src="./illustrations/cutout/exile.png" alt="" /></div>

  <!-- 무대 중앙을 차지한 빌런 -->
  <div class="usurper"><img src="./illustrations/cutout/villain.png" alt="" /></div>

  <div class="stage-scrim"></div>

  <div class="stage-layer">
    <div class="stage-cat"><span class="dot"></span><span class="text">자리가 어긋날 때</span></div>
    <div class="stage-main">
      <div class="stage-title"><span class="accent">빌런</span>이 리더 자리에<br />앉기 시작하면</div>
      <div class="stage-body">
        나를 다그치는 빌런이 무대 중앙을 차지하면 — 매일이 자기 검열이 되고, 무얼 해내도 부족하게만 느껴지고, <span class="strong">쉬는 순간조차 불안</span>해져요.
      </div>
      <div class="stage-note">배역이 나빠서가 아니라, <span class="hl">자리가 바뀌어서</span> 벌어지는 일이에요.</div>
    </div>
    <div class="stage-foot"><span class="pg">05 / 07</span><span class="next">NEXT →</span></div>
  </div>
</div>
</body>
</html>
