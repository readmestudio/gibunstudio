<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>5ROLES 06 — 난봉꾼이 나서지 말아야 할 때 나서면</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="../shared.css" />
<link rel="stylesheet" href="./card.css" />
</head>
<body>
<div class="card stage">
  <div class="stage-spot"></div>

  <!-- 밀려난 배역들 -->
  <div class="pushed p1"><img src="./illustrations/cutout/leader.png" alt="" /></div>
  <div class="pushed p2"><img src="./illustrations/cutout/villain.png" alt="" /></div>
  <div class="pushed p3"><img src="./illustrations/cutout/manager.png" alt="" /></div>
  <div class="pushed p4"><img src="./illustrations/cutout/exile.png" alt="" /></div>

  <!-- 무대 중앙을 차지한 난봉꾼 -->
  <div class="usurper"><img src="./illustrations/cutout/rake.png" alt="" /></div>

  <div class="stage-scrim"></div>

  <div class="stage-layer">
    <div class="stage-cat"><span class="dot"></span><span class="text">또 다른 어긋남</span></div>
    <div class="stage-main">
      <div class="stage-title"><span class="accent">난봉꾼</span>이 나서지 말아야 할<br />순간에 나서면</div>
      <div class="stage-body">
        위기에만 튀어나와야 할 난봉꾼이 아무 때나 나서면 — 별일 아닌데 폭발하고, 중요한 순간에 도망치고, <span class="strong">나중에 후회할 행동</span>을 먼저 저질러요.
      </div>
      <div class="stage-note">이 역시 배역이 나빠서가 아니라, <span class="hl">나설 때가 어긋나서</span> 벌어지는 일이에요.</div>
    </div>
    <div class="stage-foot"><span class="pg">06 / 07</span><span class="next">NEXT →</span></div>
  </div>
</div>
</body>
</html>
