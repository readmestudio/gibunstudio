<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>5ROLES 01 — 표지</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="../shared.css" />
<style>
  .card.cover { position: relative; padding: 0; overflow: hidden; }

  /* 배경: 5배역 크레파스 캐릭터 타일 모자이크 */
  .cover-tiles { position: absolute; inset: 0; z-index: 0; overflow: hidden; }
  .cover-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-rows: 360px; gap: 14px;
    position: absolute; inset: -10% -8%;
    transform: rotate(-5deg) scale(1.14); transform-origin: center;
    opacity: 0.4;
  }
  .cover-grid img { width: 100%; height: 100%; object-fit: cover; object-position: center; border-radius: 12px; }

  .cover-scrim { position: absolute; inset: 0; z-index: 1; pointer-events: none;
    background: linear-gradient(180deg,
      rgba(14,14,16,0.46) 0%, rgba(14,14,16,0.3) 24%, rgba(14,14,16,0.4) 46%,
      rgba(14,14,16,0.74) 64%, rgba(14,14,16,0.93) 82%, rgba(14,14,16,0.99) 100%); }

  .cover-layer { position: relative; z-index: 2; height: 100%; box-sizing: border-box;
    padding: 80px 80px 150px; display: flex; flex-direction: column; justify-content: flex-end; }

  .cover-layer .brand {
    font-size: 30px; font-weight: 500; color: var(--text-tertiary);
    letter-spacing: -0.01em; margin-bottom: 24px; text-shadow: 0 2px 14px rgba(0,0,0,0.7); }

  .cover-layer .title {
    font-size: 82px; font-weight: 700; line-height: 1.18; letter-spacing: -0.04em;
    color: #fff; margin-bottom: 34px; text-shadow: 0 6px 40px rgba(0,0,0,0.72); }
  .cover-layer .title .accent { color: var(--accent); }

  .cover-layer .subtitle {
    font-size: 40px; font-weight: 400; line-height: 1.4; letter-spacing: -0.02em;
    color: var(--text-secondary); text-shadow: 0 2px 16px rgba(0,0,0,0.78); }
</style>
</head>
<body>
<div class="card cover">
  <div class="cover-tiles">
    <div class="cover-grid">
      <img src="./illustrations/leader.png" alt="" /><img src="./illustrations/villain.png" alt="" /><img src="./illustrations/rake.png" alt="" /><img src="./illustrations/manager.png" alt="" />
      <img src="./illustrations/exile.png" alt="" /><img src="./illustrations/manager.png" alt="" /><img src="./illustrations/leader.png" alt="" /><img src="./illustrations/villain.png" alt="" />
      <img src="./illustrations/rake.png" alt="" /><img src="./illustrations/exile.png" alt="" /><img src="./illustrations/villain.png" alt="" /><img src="./illustrations/leader.png" alt="" />
      <img src="./illustrations/manager.png" alt="" /><img src="./illustrations/rake.png" alt="" /><img src="./illustrations/exile.png" alt="" /><img src="./illustrations/villain.png" alt="" />
      <img src="./illustrations/leader.png" alt="" /><img src="./illustrations/manager.png" alt="" /><img src="./illustrations/rake.png" alt="" /><img src="./illustrations/exile.png" alt="" />
    </div>
  </div>
  <div class="cover-scrim"></div>

  <div class="cover-layer">
    <div class="brand">기분 스튜디오</div>
    <div class="title">자책하고, 몰아붙이고,<br />또 실망하고.<br />이 모든 게 <span class="accent">한 순간</span>에.</div>
    <div class="subtitle">지금의 나를 만든 내 마음 속 목소리들</div>
  </div>
</div>
</body>
</html>
