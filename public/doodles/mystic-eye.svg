  <path stroke="#191919" stroke-width="1.2" stroke-linecap="round" d="M40 50l2 5 5 2-5 2-2 5-2-5-5-2 5-2z"/>
  <path stroke="#191919" stroke-width="1.2" stroke-linecap="round" d="M155 45l2 5 5 2-5 2-2 5-2-5-5-2 5-2z"/>
  <path stroke="#191919" stroke-width="1.2" stroke-linecap="round" d="M165 155l1.5 4 4 1.5-4 1.5-1.5 4-1.5-4-4-1.5 4-1.5z"/>

  <!-- 초승달 장식 -->
  <path
    stroke="#191919"
    stroke-width="1.5"
    stroke-linecap="round"
    d="M28 135c8-5 8-20 0-25 12 2 15 23 0 25z"
  />
