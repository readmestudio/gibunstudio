    stroke="#191919"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    d="M30 100c0 0 30-45 70-45s70 45 70 45-30 45-70 45-70-45-70-45z"
  />

  <!-- 홍채 원 -->
  <circle cx="100" cy="100" r="25" stroke="#191919" stroke-width="2"/>

  <!-- 동공 -->
  <circle cx="100" cy="100" r="10" fill="#191919"/>

  <!-- 동공 하이라이트 -->
  <circle cx="106" cy="94" r="4" fill="white"/>

  <!-- 위 속눈썹 — 방사형 -->
  <path stroke="#191919" stroke-width="1.5" stroke-linecap="round" d="M60 72l-5-15"/>
  <path stroke="#191919" stroke-width="1.5" stroke-linecap="round" d="M75 62l-2-16"/>
  <path stroke="#191919" stroke-width="1.5" stroke-linecap="round" d="M90 57l1-16"/>
  <path stroke="#191919" stroke-width="1.5" stroke-linecap="round" d="M105 55l4-15"/>
  <path stroke="#191919" stroke-width="1.5" stroke-linecap="round" d="M120 58l7-14"/>
  <path stroke="#191919" stroke-width="1.5" stroke-linecap="round" d="M135 66l10-10"/>

  <!-- 아래 장식 — 눈물 방울 -->
  <path
    stroke="#191919"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    d="M100 150c-3-8-8-15 0-22 8 7 3 14 0 22z"
  />

